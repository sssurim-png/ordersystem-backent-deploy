name: Deploy to Ec2 With Docker
on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
#      - 깃허브에서 가상pc로 코드 클론떠온 것
      - uses: actions/checkout@v2

      - name: Build Docker Image
        working-directory: .
#        기본으로 도커를 깔아줌(본인이름 변경)
        run: docker build -t ss19990222/myordersystem2:latest .

#     도커허브 로그인 할수 있게 (비밀번호 지정해줘야한다)
      - name: DockerHub Login
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

#     2.push 본인이름 push변경
      - name: Push Docker Image to DockerHub
        run: docker push ss19990222/myordersystem2:latest
#     3. ec2로그인 ec2에 ssh로 로그인 (host, pem key정보 넣기)
      - name: instance1 ec2 ssh login and docker run
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST1 }}
          username: ubuntu
          key: ${{ secrets.EC2_PEMKEY }}

          script: |

            if ! type docker > /dev/null ; then
              export DEBIAN_FRONTEND=noninteractive
              curl -fsSL https://get.docker.com | bash

            fi
            sudo docker login --username ${{ secrets.DOCKER_USERNAME }} --password ${{ secrets.DOCKER_PASSWORD }}

            sudo docker pull ss19990222/myordersystem2:latest

            sudo docker rm -f myspring || true

            sudo docker run -d --name myspring  -p 8080:8080 \

            -e SPRING_REDIS_HOST=${{ secrets.REDIS_HOST }} \


            -e SPRING_DATASOURCE_URL=jdbc:mariadb://${{ secrets.DB_HOST }}:3306/ordersystem?useSSL=true \
            -e SPRING_DATASOURCE_USERNAME=admin \

            -e SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PW }} ss19990222/myordersystem2:latest


